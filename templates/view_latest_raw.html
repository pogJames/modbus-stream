{% extends "base.html" %}

{% block content %}
<div style="padding: 2rem 0;">

  <div class="page-header">
    <h1 class="page-title">Latest Raw Reading</h1>
    <span class="badge" id="poll-badge">
      <span class="badge-dot"></span>
      Connecting…
    </span>
  </div>

  <div style="display:flex; flex-direction:column; gap:0.75rem;">

    {% for i in range(1, sensor_count + 1) %}
    <details class="sensor-panel" open>
      <summary>
        <span>Sensor {{ i }}</span>
        <span class="sensor-panel-ts" id="s{{ i }}-footer-ts"></span>
        <svg class="sensor-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </summary>
      <div class="sensor-panel-body">
        <div class="display-grid">
          <div class="display-card x">
            <div class="display-axis">X Axis</div>
            <div class="display-value" id="s{{ i }}-val-x">—</div>
            <div class="display-unit">g</div>
          </div>
          <div class="display-card y">
            <div class="display-axis">Y Axis</div>
            <div class="display-value" id="s{{ i }}-val-y">—</div>
            <div class="display-unit">g</div>
          </div>
          <div class="display-card z">
            <div class="display-axis">Z Axis</div>
            <div class="display-value" id="s{{ i }}-val-z">—</div>
            <div class="display-unit">g</div>
          </div>
        </div>
      </div>
    </details>
    {% endfor %}

    <div class="data-footer" style="border-top:none; margin-top:0; padding-top:0.25rem;">
      <span></span>
      <span>Refreshes every 500 ms</span>
    </div>

  </div>

</div>

<script>
const badge = document.getElementById('poll-badge');

function fmt(v) {
  if (v == null) return '—';
  const sign = v < 0 ? '−' : '+';
  return sign + Math.abs(v).toFixed(4);
}

function fmtTs(ts) {
  return new Date(ts).toLocaleTimeString([], {
    hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3
  });
}

function setOk() {
  badge.className = 'badge ok';
  badge.lastChild.textContent = ' Connected';
}

function setErr(msg) {
  badge.className = 'badge err';
  badge.lastChild.textContent = ' ' + (msg || 'Error');
}

function updateSensor(prefix, d) {
  if (!d) return;
  document.getElementById(prefix + '-val-x').textContent = fmt(d.x);
  document.getElementById(prefix + '-val-y').textContent = fmt(d.y);
  document.getElementById(prefix + '-val-z').textContent = fmt(d.z);
  const ts = document.getElementById(prefix + '-footer-ts');
  if (ts) ts.textContent = fmtTs(d.timestamp);
}

async function poll() {
  try {
    const res = await fetch('/read/latest-raw');
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      setErr(j.error || ('HTTP ' + res.status));
      return;
    }
    const d = await res.json();
    {% for i in range(1, sensor_count + 1) %}
    updateSensor('s{{ i }}', d.sensor{{ i }});
    {% endfor %}
    setOk();
  } catch (e) {
    setErr('Offline');
  }
}

poll();
setInterval(poll, 500);
</script>
{% endblock %}
