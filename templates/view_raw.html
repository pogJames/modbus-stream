{% extends "base.html" %}

{% block content %}
<style>
  .view-header    { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .view-header h2 { font-size:1.4rem; font-weight:600; flex:1; }

  .range-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .range-card {
    background: var(--background-white);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius);
    padding: 0.875rem 1.125rem;
  }
  .range-card .axis-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    margin-bottom: 0.625rem;
    padding-bottom: 0.375rem;
    border-bottom: 1px solid var(--border-color);
  }
  .range-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
  }
  .range-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    font-weight: 500;
    width: 2.5rem;
  }
  .range-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .range-card.x .range-val { color: #ef4444; }
  .range-card.y .range-val { color: #22c55e; }
  .range-card.z .range-val { color: #3b82f6; }


  .chart-card {
    background: var(--background-white);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius);
    padding: 1.25rem;
  }
  .chart-toolbar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .chart-toolbar .toolbar-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    flex: 1;
    min-width: 120px;
  }
  .window-input {
    width: 90px;
    padding: 3px 8px;
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius);
    background: var(--background-white);
    color: var(--text-primary);
    text-align: right;
  }
  .window-input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgb(37 99 235 / 0.1);
  }

  .sample-counter { font-size:0.72rem; color:var(--text-secondary); margin-top:0.5rem; text-align:right; font-family:'JetBrains Mono',monospace; }
</style>

<div style="padding:2rem 0;">
  <div class="view-header">
    <h2>Raw Data Stream</h2>
    <span class="ws-status" id="ws-status">Connecting…</span>
  </div>

  <!-- Range display -->
  <div class="range-grid">
    <div class="range-card x">
      <div class="axis-label">X Axis</div>
      <div class="range-row"><span class="range-label">min</span><span class="range-val" id="rng-x-min">—</span></div>
      <div class="range-row"><span class="range-label">max</span><span class="range-val" id="rng-x-max">—</span></div>
    </div>
    <div class="range-card y">
      <div class="axis-label">Y Axis</div>
      <div class="range-row"><span class="range-label">min</span><span class="range-val" id="rng-y-min">—</span></div>
      <div class="range-row"><span class="range-label">max</span><span class="range-val" id="rng-y-max">—</span></div>
    </div>
    <div class="range-card z">
      <div class="axis-label">Z Axis</div>
      <div class="range-row"><span class="range-label">min</span><span class="range-val" id="rng-z-min">—</span></div>
      <div class="range-row"><span class="range-label">max</span><span class="range-val" id="rng-z-max">—</span></div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="chart-toolbar">
      <span class="toolbar-label" id="window-label">Last 4100 samples</span>
      <input type="number" id="window-input" class="window-input"
             value="4100" min="10" max="50000" step="1"
             title="Number of samples to display">
      <button id="pause-btn" class="btn btn-info" style="padding:4px 12px;font-size:0.8rem;">Pause</button>
    </div>
    <canvas id="chart"></canvas>
    <div class="sample-counter" id="sample-count">0 samples received</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let MAX_POINTS = 4100;

const xData  = [];
const yData  = [];
const zData  = [];
const labels = [];

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'X (g)', data: xData, borderColor: '#ef4444', borderWidth: 1.5, pointRadius: 0, tension: 0 },
      { label: 'Y (g)', data: yData, borderColor: '#22c55e', borderWidth: 1.5, pointRadius: 0, tension: 0 },
      { label: 'Z (g)', data: zData, borderColor: '#3b82f6', borderWidth: 1.5, pointRadius: 0, tension: 0 },
    ]
  },
  options: {
    animation: false,
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: { display: false },
      y: {
        title: { display: true, text: 'g', color: '#888' },
        grid:  { color: '#2a2a2a' },
        ticks: { color: '#888' }
      }
    },
    plugins: { legend: { labels: { color: '#ccc', usePointStyle: true, pointStyle: 'circle' } } }
  }
});

// ── Window control ────────────────────────────────────────────
function setWindow(n) {
  MAX_POINTS = n;
  const drop = xData.length - MAX_POINTS;
  if (drop > 0) {
    xData.splice(0, drop);
    yData.splice(0, drop);
    zData.splice(0, drop);
    labels.splice(0, drop);
  }
  document.getElementById('window-label').textContent = `Last ${n.toLocaleString()} samples`;
}

const windowInput = document.getElementById('window-input');
windowInput.addEventListener('change', () => {
  const n = Math.max(10, Math.min(50000, parseInt(windowInput.value, 10) || 7812));
  windowInput.value = n;
  setWindow(n);
});

// ── Range computation ─────────────────────────────────────────
function rangeOf(arr) {
  let min = Infinity, max = -Infinity;
  for (const v of arr) {
    if (v == null) continue;
    if (v < min) min = v;
    if (v > max) max = v;
  }
  return min === Infinity ? null : { min, max };
}

function fmtG(v) {
  return v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(4);
}

function updateRanges() {
  const rx = rangeOf(xData);
  const ry = rangeOf(yData);
  const rz = rangeOf(zData);
  document.getElementById('rng-x-min').textContent = rx ? fmtG(rx.min) : '—';
  document.getElementById('rng-x-max').textContent = rx ? fmtG(rx.max) : '—';
  document.getElementById('rng-y-min').textContent = ry ? fmtG(ry.min) : '—';
  document.getElementById('rng-y-max').textContent = ry ? fmtG(ry.max) : '—';
  document.getElementById('rng-z-min').textContent = rz ? fmtG(rz.min) : '—';
  document.getElementById('rng-z-max').textContent = rz ? fmtG(rz.max) : '—';
}

// ── Render loop (~30 fps) ─────────────────────────────────────
let pending = [];
let paused  = false;
let totalSamples = 0;

setInterval(() => {
  if (paused || pending.length === 0) return;

  for (const s of pending) {
    xData.push(s.x);
    yData.push(s.y);
    zData.push(s.z);
    labels.push('');
  }
  pending = [];

  // trim to window
  const drop = xData.length - MAX_POINTS;
  if (drop > 0) {
    xData.splice(0, drop);
    yData.splice(0, drop);
    zData.splice(0, drop);
    labels.splice(0, drop);
  }

  updateRanges();
  chart.update('none');
}, 33);

// ── WebSocket ─────────────────────────────────────────────────
const ws       = new WebSocket(`ws://${location.host}/stream/raw`);
const statusEl = document.getElementById('ws-status');
const countEl  = document.getElementById('sample-count');

ws.onopen  = () => { statusEl.textContent = 'Connected';    statusEl.className = 'ws-status ok'; };
ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.className = 'ws-status err'; };
ws.onerror = () => { statusEl.textContent = 'Error';        statusEl.className = 'ws-status err'; };

ws.onmessage = ({ data }) => {
  const msg = JSON.parse(data);
  if (msg.type === 'raw' && Array.isArray(msg.data) && msg.data.length > 0) {
    pending.push(...msg.data);
    totalSamples += msg.data.length;
    countEl.textContent = `${totalSamples.toLocaleString()} samples received`;
  }
};

// ── Pause / resume ────────────────────────────────────────────
document.getElementById('pause-btn').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Resume' : 'Pause';
  this.style.background = paused ? 'var(--muted)' : '';
});
</script>
{% endblock %}
