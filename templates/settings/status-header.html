<div class="status-header">
    <div class="status-header-top">
        <div class="status-header-name">{{ sensor.label }}</div>
        <div class="connection-status {{ sensor.status_class }}">
            <span class="status-indicator"></span>
            {{ sensor.connection_status }}
        </div>
    </div>

    {% if sensor.sensor_info %}
    <div class="sensor-info">
        <div class="sensor-detail">
            <span class="label">Model</span>
            <span class="value">{{ sensor.sensor_info.model }} ({{ sensor.sensor_info.gain }})</span>
        </div>
        <div class="sensor-detail">
            <span class="label">Serial</span>
            <span class="value">{{ sensor.sensor_info.serialNumber }}</span>
        </div>
        {% if sensor.firmware_version %}
        <div class="sensor-detail">
            <span class="label">Firmware</span>
            <span class="value">{{ sensor.firmware_version }}</span>
        </div>
        {% endif %}
    </div>
    {% endif %}
</div>
